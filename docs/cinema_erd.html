
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  users {
    int id PK
    varchar email
    varchar password_hash
    varchar role
    numeric balance
    varchar first_name
    varchar last_name
    timestamp created_at
    timestamp updated_at
  }
  refresh_tokens {
    int id PK
    int user_id FK
    varchar token_hash
    timestamp expires_at
    timestamp created_at
    timestamp revoked_at
  }
  rooms {
    int id PK
    varchar name
    text description
    varchar type
    smallint capacity
    boolean has_disabled_access
    boolean is_maintenance
    timestamp created_at
    timestamp updated_at
  }
  room_images {
    int id PK
    int room_id FK
    text url
    smallint display_order
  }
  movies {
    int id PK
    varchar title
    text description
    int duration_minutes
    varchar genre
    text poster_url
    date release_date
    timestamp created_at
    timestamp updated_at
  }
  screenings {
    int id PK
    int movie_id FK
    int room_id FK
    timestamp start_time
    timestamp end_time
    timestamp created_at
    timestamp updated_at
  }
  tickets {
    int id PK
    int user_id FK
    varchar type
    smallint remaining_uses
    numeric price_paid
    timestamp purchased_at
  }
  ticket_uses {
    int id PK
    int ticket_id FK
    int screening_id FK
    timestamp used_at
  }
  transactions {
    int id PK
    int user_id FK
    varchar type
    numeric amount
    text description
    timestamp created_at
  }
  employees {
    int id PK
    int user_id FK
    varchar first_name
    varchar last_name
    varchar position
    timestamp created_at
    timestamp updated_at
  }
  employee_schedules {
    int id PK
    int employee_id FK
    timestamp start_time
    timestamp end_time
    timestamp created_at
  }

  users ||--o{ refresh_tokens : "possède"
  users ||--o{ tickets : "achète"
  users ||--o{ transactions : "effectue"
  users ||--o| employees : "peut être"
  rooms ||--o{ room_images : "a"
  rooms ||--o{ screenings : "accueille"
  movies ||--o{ screenings : "projeté dans"
  screenings ||--o{ ticket_uses : "consomme"
  tickets ||--o{ ticket_uses : "utilisé via"
  employees ||--o{ employee_schedules : "planifié"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
